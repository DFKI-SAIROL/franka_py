/**:
  dynamixel_controller_manager:
    ros__parameters:
      update_rate: 50  # Hz

      gripper_joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster

      gripper_controller:
        type: joint_trajectory_controller/JointTrajectoryController

  gripper_controller:
    ros__parameters:
      joints:
        - franka_right_rh_r1
      command_interfaces:
        - position
      state_interfaces:
        - position
        - velocity

  gripper_joint_state_broadcaster:
    ros__parameters:
      joints:
        - franka_right_rh_r1
