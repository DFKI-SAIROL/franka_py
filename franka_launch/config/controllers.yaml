/**:
  joint_trajectory_controller:
    ros__parameters:
      joints:
        - fr3_joint1
        - fr3_joint2
        - fr3_joint3
        - fr3_joint4
        - fr3_joint5
        - fr3_joint6
        - fr3_joint7

      command_interfaces:
        - effort

      state_interfaces:
        - position
        - velocity

      gains:
        fr3_joint1: { p: 600., d: 30., i: 0., i_clamp: 1. }
        fr3_joint2: { p: 600., d: 30., i: 0., i_clamp: 1. }
        fr3_joint3: { p: 600., d: 30., i: 0., i_clamp: 1. }
        fr3_joint4: { p: 600., d: 30., i: 0., i_clamp: 1. }
        fr3_joint5: { p: 250., d: 10., i: 0., i_clamp: 1. }
        fr3_joint6: { p: 150., d: 10., i: 0., i_clamp: 1. }
        fr3_joint7: { p:  50., d:  5., i: 0., i_clamp: 1. }

      constraints:
        goal_time: 0.0

      state_publish_rate: 1000.0
      action_monitor_rate: 100.0

/**:
  cartesian_impedance_controller:
    ros__parameters:
      joints:
        - fr3_joint1
        - fr3_joint2
        - fr3_joint3
        - fr3_joint4
        - fr3_joint5
        - fr3_joint6
        - fr3_joint7
      base_frame: base

      filter:
        q: 0.5
        dq: 0.5
        output_torque: 0.5

      task:
        k_pos_x: 400.0
        k_pos_y: 400.0
        k_pos_z: 400.0
        k_rot_x: 30.0
        k_rot_y: 30.0
        k_rot_z: 30.0

      nullspace: 
        stiffness: 0.5

      use_friction: false
      use_coriolis_compensation: true
      use_local_jacobian: true

/**:
  joint_impedance_controller:
    ros__parameters:
      joints:
        - fr3_joint1
        - fr3_joint2
        - fr3_joint3
        - fr3_joint4
        - fr3_joint5
        - fr3_joint6
        - fr3_joint7
      base_frame: base

      task:
        k_pos_x: 0.0
        k_pos_y: 0.0
        k_pos_z: 0.0
        k_rot_x: 0.0
        k_rot_y: 0.0
        k_rot_z: 0.0

      max_delta_tau: 1.0

      nullspace: 
        stiffness: 1.0
        projector_type: none  # So we are directly controlling the joints!
        damping: 0.5
        max_tau: 40.0
        regularization: 1.0e-06
        weights:
          franka_right_fr3_joint1.value: 100.0
          franka_right_fr3_joint2.value: 100.0
          franka_right_fr3_joint3.value: 100.0
          franka_right_fr3_joint4.value: 100.0
          franka_right_fr3_joint5.value: 30.0
          franka_right_fr3_joint6.value: 20.0
          franka_right_fr3_joint7.value: 10.0
          franka_left_fr3_joint1.value: 100.0
          franka_left_fr3_joint2.value: 100.0
          franka_left_fr3_joint3.value: 100.0
          franka_left_fr3_joint4.value: 100.0
          franka_left_fr3_joint5.value: 30.0
          franka_left_fr3_joint6.value: 20.0
          franka_left_fr3_joint7.value: 10.0

      use_friction: false
      use_coriolis_compensation: true
      use_local_jacobian: true
      # limit_error: true
      # limit_torques: true
