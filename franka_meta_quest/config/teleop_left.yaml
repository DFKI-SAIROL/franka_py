# VR Teleoperation Configuration (LEFT ARM)

# Controller Selection (left or right)
right_controller: false

# Velocity Limits
max_lin_vel: 0.5
max_rot_vel: 1.0
max_gripper_vel: 1.0

# Gains and Coefficients
spatial_coeff: 1.0
pos_action_gain: 1.0
rot_action_gain: 1.0
gripper_action_gain: 1.0

# Robot Matrix Reorder (maps VR axes to robot axes)
rmat_reorder: [-2, -1, -3, 4]

# Robot Frames
base_frame: "world"

# Robot Communication
publish_joint_trajectory: true
target_joint_topic: "internal/target_joint"
target_pose_topic: "internal/target_pose"
